name: update-claude

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Channel or exact version (latest, stable, or X.Y.Z)"
        type: string
        default: latest
  schedule:
    - cron: "0 7 * * *"

permissions:
  contents: write

concurrency:
  group: update-claude
  cancel-in-progress: false

jobs:
  update:
    runs-on: macos-latest
    env:
      CHANNEL: ${{ inputs.channel || 'latest' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@630ae543ea3a38a9a4166f03376c02c50f408342 # v31.11.0
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Bump the pin
        id: bump
        run: |
          nix run .#update -- "$CHANNEL"
          if git diff --quiet -- package.nix; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Already current — nothing to do."
          else
            version="$(sed -n 's/.*version = "\([^"]*\)".*/\1/p' package.nix | head -n1)"
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify it builds
        if: steps.bump.outputs.changed == 'true'
        run: nix build .#claude-code

      - name: Commit and push
        if: steps.bump.outputs.changed == 'true'
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "claude: update to ${VERSION}" \
            -m "Automated pin bump, verified with \`nix build .#claude-code\`."
          git push
